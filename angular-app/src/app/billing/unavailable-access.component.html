<section class="unavailable-shell">
  <div class="ambient ambient-left"></div>
  <div class="ambient ambient-right"></div>

  <div class="content-wrap">
    <p-card class="unavailable-card">
      <ng-template pTemplate="header">
        <div class="brand-hero">
          <div class="brand-pill">
            <img src="/public/icon-512.png" alt="Lumos Logo" width="42" height="42">
            <span>Lumos</span>
          </div>

          <div class="hero-copy">
            <span class="eyebrow">Acesso indisponível</span>
            <h1>Acesso temporariamente indisponível</h1>
            <p>
              No momento, não foi possível liberar seu acesso ao sistema.
            </p>
            <p>
              Em caso de dúvidas, fale com um usuário administrador.
            </p>
          </div>
        </div>
      </ng-template>

      <div class="body-content">
        <!-- <div class="status-panel">
          <div class="status-icon">
            <i class="pi pi-lock"></i>
          </div>

          <div class="status-text">
            <strong>Como continuar</strong>  
            <p>Se o acesso permanecer indisponível, procure um administrador para validar a sua liberação.</p>
          </div>
        </div> -->

        <!-- <div class="reasons-card">
          <p class="reasons-title">Algumas situações comuns</p>

          <ul class="reasons-list">
            <li>Seu acesso ainda não foi liberado.</li>
            <li>Existe alguma pendência no ambiente.</li>
            <li>O sistema está temporariamente indisponível.</li>
            <li>É necessário revisar suas permissões de acesso.</li>
          </ul>
        </div> -->
      </div>

      <ng-template pTemplate="footer">
        <div class="actions">
          <button
            pButton
            type="button"
            label="Tentar novamente"
            icon="pi pi-replay"
            severity="primary"
            (click)="router.navigate(['']);"
            [loading]="loggingOut"
            class="w-full"
          ></button>

          <button
            pButton
            type="button"
            label="Fazer logout"
            icon="pi pi-sign-out"
            severity="secondary"
            (click)="logout()"
            [loading]="loggingOut"
            class="w-full"
          ></button>
        </div>
      </ng-template>
    </p-card>

    <div class="support-note">
      <span>Precisa de ajuda?</span>
      <a href="mailto:support@lumos.com">Contate nosso suporte</a>
    </div>
  </div>
</section>
