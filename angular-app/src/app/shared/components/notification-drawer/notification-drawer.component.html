<div class="card flex justify-center">
  <p-drawer
    position="right"
    [visible]="(SharedState.showNotificationDrawer$ | async) ?? false"
    (visibleChange)="onDrawerChange($event)"
    [closable]="false"
    styleClass="w-96 max-w-full">

    <!-- HEADER -->
    <ng-template #header>
      <div class="flex items-center justify-between   w-full">

        <div class="flex items-center gap-3">
          <span class="pi pi-bell text-lg text-neutral-500"></span>
          <span class="font-semibold text-base">Notificações</span>
        </div>

        <button
          pRipple
          class="text-sm text-neutral-500 hover:text-neutral-700 dark:hover:text-neutral-300 ml-4"
          (click)="clearAll()">
          Limpar
        </button>
      </div>
    </ng-template>

    <!-- CONTENT -->
    <div class="flex flex-col h-full overflow-y-auto custom-scrollbar">

      <div *ngFor="let group of groupKeys" class="flex flex-col">
        <div class="px-4 py-3 bg-neutral-50/50 dark:bg-neutral-900/50 sticky top-0 z-10 backdrop-blur-sm border-y border-neutral-200 dark:border-neutral-800">
      <span class="text-xs font-bold text-neutral-400 uppercase tracking-wider">
        {{ group }}
      </span>
        </div>

        <div
          *ngFor="let notification of notificationsGrouped[group]"
          class="relative flex gap-4 px-4 py-4 cursor-pointer transition-all duration-200 border-b border-neutral-100 dark:border-neutral-800 last:border-0 hover:bg-neutral-50 dark:hover:bg-neutral-900"
          [ngClass]="{'bg-blue-50/40 dark:bg-blue-900/10': notification.read === 0}"
          (click)="openNotification(notification)">

          <div
            *ngIf="notification.read === 0"
            class="absolute left-0 top-0 bottom-0 w-1 bg-blue-500 rounded-r shadow-[0_0_8px_rgba(59,130,246,0.5)]">
          </div>

          <div class="flex-shrink-0">
            <div class="w-10 h-10 rounded-full flex items-center justify-center"
                 [ngClass]="getIconBg(notification.type)">
              <i [class]="getIconClass(notification.type)" class="text-lg"></i>
            </div>
          </div>

          <div class="flex flex-col gap-1 min-w-0 flex-1">
            <div class="flex justify-between items-start gap-2">
          <span class="text-sm font-semibold truncate text-neutral-900 dark:text-neutral-100">
            {{ notification.title }}
          </span>
              <span class="text-[10px] font-medium text-neutral-400 whitespace-nowrap mt-1">
            {{ notification.timeIso | date:'HH:mm' }}
          </span>
            </div>
            <span class="text-xs leading-relaxed text-neutral-500 dark:text-neutral-400 line-clamp-2">
          {{ notification.body }}
        </span>
          </div>
        </div>
      </div>

      <div *ngIf="groupKeys.length === 0" class="flex flex-col items-center justify-center py-20 px-6 text-center">
        <div class="w-16 h-16 bg-neutral-100 dark:bg-neutral-800 rounded-full flex items-center justify-center mb-4">
          <i class="pi pi-bell-slash text-2xl text-neutral-400"></i>
        </div>
        <h3 class="text-neutral-900 dark:text-neutral-100 font-medium">Tudo limpo por aqui!</h3>
        <p class="text-sm text-neutral-500 max-w-[200px] mt-2">Você não tem notificações pendentes no momento.</p>
      </div>
    </div>

  </p-drawer>

</div>
